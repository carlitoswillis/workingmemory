# Render blueprint — the $0 deploy path (free web service, no persistent disk).
# Works BECAUSE the disk is disposable by design: scripts/start.sh restores the
# owner DB from the Litestream replica (R2/B2) on every boot, and demo boards
# are ephemeral anyway. Tradeoff vs Fly: free services spin down after 15 idle
# minutes and cold-start in ~1 min.
#
# Set in the Render dashboard (Environment, marked secret):
#   OWNER_SECRET                  openssl rand -base64 32  (ops bearer for
#                                 /api/export|import; also seeds the migrated
#                                 'owner' account's first password)
#   SESSION_SECRET                openssl rand -base64 32  (signs wm_session
#                                 account cookies; rotating it signs everyone out)
#   LITESTREAM_REPLICA_URL        s3://<bucket>.s3.<region>.backblazeb2.com/owner-wm
#                                 (B2's S3 endpoint embedded in the host; R2 works
#                                 the same way but requires a card on file, and its
#                                 free tier caps writes — B2 uploads are free)
#   LITESTREAM_ACCESS_KEY_ID      B2 application keyID (scoped to the bucket)
#   LITESTREAM_SECRET_ACCESS_KEY  B2 application key
services:
  - type: web
    name: workingmemory-demo
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DEMO_MODE
        value: "1"
      - key: DATA_DIR
        value: /data
      - key: PORT
        value: "3000"
      - key: OWNER_SECRET
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: LITESTREAM_REPLICA_URL
        sync: false
      - key: LITESTREAM_ACCESS_KEY_ID
        sync: false
      - key: LITESTREAM_SECRET_ACCESS_KEY
        sync: false
